name: Deploy to Oracle Server

on:
  push:
    branches:
      - main # Triggers the pipeline every time you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Uses a modern, stable version of Node

      - name: Install Dependencies and Build
        run: |
          npm ci
          npm run build

      - name: Deploy via Rsync
        env:
          PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          HOST: ${{ secrets.OCI_HOST }}
          USER: ubuntu
        run: |
          # Set up the SSH key securely
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          # Tell GitHub to trust your Oracle server's fingerprint
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
          
          # Sync ONLY the compiled build folder to your server
          # IMPORTANT: Change './dist/' to './build/' below if you used Create React App!
          rsync -avz --delete ./dist/ ubuntu@$HOST:/var/www/my-website/


















