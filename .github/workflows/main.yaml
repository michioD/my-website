name: Deploy to Oracle Server

on:
  push:
    branches:
      - main # Triggers the pipeline every time you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. FRONTEND BUILD ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies and Build Frontend
        run: |
          npm ci
          npm run build

      # --- 2. BACKEND BUILD ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go Backend
        run: |
          cd backend
          # Compile the Go binary specifically for the Ubuntu server environment
          GOOS=linux GOARCH=amd64 go build -o go-server main.go

      # --- 3. DEPLOY VIA RSYNC ---
      - name: Deploy via Rsync
        env:
          PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          HOST: ${{ secrets.OCI_HOST }}
          USER: ubuntu
        run: |
          # Set up the SSH key securely
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          # Tell GitHub to trust your Oracle server's fingerprint
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
          
          # Ensure the backend directory exists on the server before syncing
          ssh ubuntu@$HOST "mkdir -p /var/www/my-website/backend"
          
          # Sync the compiled frontend build folder
          rsync -avz --delete ./dist/ ubuntu@$HOST:/var/www/my-website/
          
          # Sync the compiled Go binary
          rsync -avz ./backend/go-server ubuntu@$HOST:/var/www/my-website/backend/

      # --- 4. SECURE SECRETS & RESTART ---
      - name: Inject Secret and Restart Backend
        uses: appleboy/ssh-action@v1.0.3
        env:
          PROD_KEY: ${{ secrets.IPSTACK_KEY }}
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_PRIVATE_KEY }}
          envs: PROD_KEY
          script: |
            cd /var/www/my-website/backend
            
            # Securely write the key to the local .env file
            echo "IPSTACK_KEY=$PROD_KEY" > .env
            chmod 600 .env
            
            # Ensure the binary is executable
            chmod +x go-server
            
            # Restart the systemd service to pick up the new binary and secrets
            sudo systemctl restart my-go-backend




